<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arsy — Historia Sztuki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">◆</span>
        <div class="brand-text">
          <span class="brand-name">Arsy</span>
          <span class="brand-tagline">Historia Sztuki</span>
        </div>
      </div>

      <nav class="categories" aria-label="Filtruj karty">
        <!-- View tabs -->
        <button class="cat-btn tab-active" id="cardsTabBtn">Fiszki</button>
        <button class="cat-btn" id="vocabTabBtn">Słownik</button>

        <span class="nav-divider" aria-hidden="true"></span>

        <!-- Category filters (flashcards only) -->
        <button class="cat-btn is-active" data-cat="all">Wszystkie</button>
        <button class="cat-btn" data-cat="Eras">Epoki</button>
        <button class="cat-btn" data-cat="Styles">Style</button>
        <button class="cat-btn" data-cat="Techniques">Techniki</button>
      </nav>

      <!-- Language toggle -->
      <button class="lang-btn" id="langBtn" aria-label="Zmień język / Switch language">EN</button>
    </div>
    <div class="progress-track-wrap" role="progressbar" aria-label="Postęp nauki" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progressRole">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </header>

  <main class="main">

    <!-- ══════════════ FLASHCARDS VIEW ══════════════ -->
    <div id="cardsView">
      <div class="deck-meta">
        <span class="deck-progress" id="progressText">Karta 1 z 12</span>
        <span class="deck-category" id="categoryLabel">Wszystkie kategorie</span>
      </div>

      <div class="scene">
        <div class="card" id="flashcard" tabindex="0" role="button" aria-pressed="false" aria-label="Fiszka — kliknij, by obrócić">
          <div class="card-inner" id="cardInner">

            <!-- FRONT -->
            <div class="face face-front">
              <div class="card-img-wrap">
                <img class="card-img" id="cardImg" src="" alt="" loading="eager" />
                <span class="cat-pill" id="frontCatPill"></span>
              </div>
              <div class="front-body">
                <p class="hint-eyebrow">Wskazówka</p>
                <p class="hint-text" id="hintText"></p>
                <h2 class="card-title" id="cardTitle"></h2>
                <p class="flip-cue">kliknij, by odkryć →</p>
              </div>
            </div>

            <!-- BACK -->
            <div class="face face-back">
              <div class="back-header">
                <span class="back-cat" id="backCat"></span>
                <h2 class="back-title" id="backTitle"></h2>
                <p class="back-period" id="backPeriod"></p>
              </div>
              <div class="back-rule"></div>
              <div class="back-body">
                <div class="info-block">
                  <p class="info-label" id="artistsLabel">Kluczowi artyści</p>
                  <p class="info-value" id="backArtists"></p>
                </div>
                <div class="info-block">
                  <p class="info-label" id="philLabel">Filozofia wizualna</p>
                  <p class="info-value" id="backPhilosophy"></p>
                </div>
              </div>
              <div class="back-footer">
                <div class="keywords" id="keywords"></div>
                <div class="back-footer-row">
                  <p class="image-credit" id="imageCredit"></p>
                  <p class="flip-cue flip-cue--reverse">↺ wróć</p>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="controls">
        <button class="nav-btn" id="prevBtn" aria-label="Poprzednia karta" disabled>
          <span class="nav-icon">←</span>
          <span class="nav-label">Poprzednia</span>
        </button>
        <span class="card-counter" id="cardCounter">1 / 12</span>
        <button class="nav-btn nav-btn--right" id="nextBtn" aria-label="Następna karta">
          <span class="nav-label">Następna</span>
          <span class="nav-icon">→</span>
        </button>
      </div>
    </div>

    <!-- ══════════════ VOCAB VIEW ══════════════ -->
    <div id="vocabView" class="view-hidden">

      <div class="vocab-meta">
        <span class="deck-progress" id="vocabCounter">Termin 1 z 20</span>
        <button class="vocab-reshuffle" id="vocabReshuffle">Przetasuj</button>
      </div>

      <div class="scene">
        <div class="card" id="vocabCard" tabindex="0" role="button" aria-pressed="false" aria-label="Fiszka słownikowa — kliknij, by obrócić">
          <div class="card-inner" id="vocabCardInner">

            <!-- FRONT: term -->
            <div class="face face-front vocab-front">
              <div class="vocab-lang-badge">PL ↔ EN</div>
              <div class="vocab-front-body">
                <p class="hint-eyebrow" id="vocabTermLabel">Termin</p>
                <h2 class="vocab-term" id="vocabTermText"></h2>
                <p class="vocab-term-sub" id="vocabTermSub"></p>
                <p class="flip-cue">kliknij, by odkryć →</p>
              </div>
            </div>

            <!-- BACK: definition -->
            <div class="face face-back vocab-back">
              <div class="back-header">
                <p class="info-label" id="vocabDefLabel">Definicja</p>
                <p class="vocab-def" id="vocabDefText"></p>
              </div>
              <p class="flip-cue flip-cue--reverse" style="margin-top:auto">↺ wróć</p>
            </div>

          </div>
        </div>
      </div>

      <div class="controls">
        <button class="nav-btn" id="vocabPrev" aria-label="Poprzedni termin" disabled>
          <span class="nav-icon">←</span>
          <span class="nav-label">Poprzedni</span>
        </button>
        <span class="card-counter" id="vocabCounterNav">· · ·</span>
        <button class="nav-btn nav-btn--right" id="vocabNext" aria-label="Następny termin">
          <span class="nav-label">Następny</span>
          <span class="nav-icon">→</span>
        </button>
      </div>
    </div>

  </main>

  <footer class="footer">
    <p class="footer-hint">
      <kbd>Spacja</kbd> lub <kbd>Enter</kbd> — obróć &nbsp;·&nbsp; <kbd>←</kbd> <kbd>→</kbd> — nawiguj
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
